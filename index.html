<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Execution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --border-active: #2e2e2e;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.08);
    --accent-glow: rgba(200,255,0,0.15);
    --red: #ff4444;
    --done-bg: #0d1500;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 80px;
    transition: background 0.4s;
  }

  body.day-done { background: var(--done-bg); }

  header {
    width: 100%;
    max-width: 480px;
    padding: 32px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .date-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .streak-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .streak-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .streak-count {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }

  .streak-count.bump { transform: scale(1.3); }

  .progress-wrap {
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 0;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .progress-pct {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }

  .progress-tasks {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s;
  }

  .card.complete { border-color: rgba(200,255,0,0.25); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
  }

  .card-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .card-count span { color: var(--accent); }

  .checks {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .check-row:active { transform: scale(0.98); }
  .check-row.checked { background: var(--accent-dim); border-color: rgba(200,255,0,0.2); }

  .check-box {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border-active);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .check-row.checked .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-box svg { display: none; }
  .check-row.checked .check-box svg { display: block; }

  .check-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    transition: color 0.15s;
  }

  .check-row.checked .check-label { color: var(--muted); text-decoration: line-through; }

  .dm-counter {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .dm-btn {
    width: 48px;
    height: 48px;
    border: 1px solid var(--border-active);
    background: none;
    color: var(--text);
    font-size: 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .dm-btn:active { background: var(--border); transform: scale(0.93); }
  .dm-btn.plus { border-color: var(--accent); color: var(--accent); }
  .dm-btn.plus:active { background: var(--accent-dim); }
  .dm-btn.minus { color: var(--muted); }

  .dm-display {
    flex: 1;
    text-align: center;
  }

  .dm-number {
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    transition: color 0.2s;
  }

  .dm-number.done { color: var(--accent); }

  .dm-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  .dm-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 14px;
    overflow: hidden;
  }

  .dm-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .complete-banner {
    display: none;
    width: calc(100% - 40px);
    max-width: 440px;
    padding: 20px;
    background: var(--accent);
    border-radius: 12px;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: bannerIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  .complete-banner.visible { display: flex; }

  @keyframes bannerIn {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .banner-title {
    font-size: 20px;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.02em;
  }

  .banner-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(0,0,0,0.5);
  }

  .sync-status {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }

  .sync-status.visible { opacity: 1; }
  .sync-status.ok { color: var(--accent); border-color: rgba(200,255,0,0.2); }
  .sync-status.err { color: var(--red); border-color: rgba(255,68,68,0.2); }
</style>
</head>
<body>

<header>
  <div>
    <div class="date-label" id="dateLabel">Loading...</div>
    <h1>Daily Output</h1>
  </div>
  <div class="streak-badge">
    <div class="streak-label">Streak</div>
    <div class="streak-count" id="streakCount">0</div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-top">
    <span class="progress-pct" id="progressPct">0%</span>
    <span class="progress-tasks" id="progressTasks">0 / 6 tasks</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<main>

  <div class="card" id="stirlingCard">
    <div class="card-header">
      <span class="card-title">Stirling Clips</span>
      <span class="card-count"><span id="stirlingDone">0</span> / 3</span>
    </div>
    <div class="checks">
      <div class="check-row" data-group="stirling" data-index="0" onclick="toggleCheck(this)">
        <div class="check-box"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="check-label">Clip 1</span>
      </div>
      <div class="check-row" data-group="stirling" data-index="1" onclick="toggleCheck(this)">
        <div class="check-box"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="check-label">Clip 2</span>
      </div>
      <div class="check-row" data-group="stirling" data-index="2" onclick="toggleCheck(this)">
        <div class="check-box"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="check-label">Clip 3</span>
      </div>
    </div>
  </div>

  <div class="card" id="brandCard">
    <div class="card-header">
      <span class="card-title">Brand Captain Clips</span>
      <span class="card-count"><span id="brandDone">0</span> / 2</span>
    </div>
    <div class="checks">
      <div class="check-row" data-group="brand" data-index="0" onclick="toggleCheck(this)">
        <div class="check-box"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="check-label">Clip 1</span>
      </div>
      <div class="check-row" data-group="brand" data-index="1" onclick="toggleCheck(this)">
        <div class="check-box"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="check-label">Clip 2</span>
      </div>
    </div>
  </div>

  <div class="card" id="dmCard">
    <div class="card-header">
      <span class="card-title">DMs Sent</span>
      <span class="card-count"><span id="dmPct">0</span>% done</span>
    </div>
    <div class="dm-counter">
      <button class="dm-btn minus" onclick="changeDm(-1)">&#8722;</button>
      <div class="dm-display">
        <div class="dm-number" id="dmNumber">0</div>
        <div class="dm-sub">/ 30 target</div>
      </div>
      <button class="dm-btn plus" onclick="changeDm(1)">+</button>
    </div>
    <div class="dm-track"><div class="dm-fill" id="dmFill"></div></div>
  </div>

</main>

<div class="complete-banner" id="completeBanner">
  <div class="banner-title">Day Complete</div>
  <div class="banner-sub" id="bannerSub">Syncing to Sheets...</div>
</div>

<div class="sync-status" id="syncStatus"></div>

<script>
// ─── CONFIG — paste your deployed Apps Script URL below ──────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIVZFQR2jXRPBITigqDpbBsTZL_YWS48wRj0GIjLE-rIUaftozIs8EC9QR5Zfam_rxkQ/exec";
// ─────────────────────────────────────────────────────────────────────

const TOTAL_TASKS = 6;

let state = {
  date: "", stirling: [false,false,false], brand: [false,false],
  dms: 0, completed: false, streak: 0, synced: false
};

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate()-1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function formatDate(str) {
  const [y,m,d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+d}, ${y}`;
}

function loadState() {
  const today = todayStr();
  const saved = JSON.parse(localStorage.getItem('exec_tracker') || '{}');
  if (saved.date === today) {
    state = saved;
  } else {
    const wasYesterday = saved.date === yesterdayStr();
    if (saved.date && !saved.synced) syncToSheets(saved, true);
    state = {
      date: today,
      stirling: [false,false,false],
      brand: [false,false],
      dms: 0,
      completed: false,
      streak: (wasYesterday && saved.completed) ? (saved.streak || 0) : 0,
      synced: false
    };
    saveState();
  }
}

function saveState() { localStorage.setItem('exec_tracker', JSON.stringify(state)); }

function completedCount() {
  return state.stirling.filter(Boolean).length
    + state.brand.filter(Boolean).length
    + (state.dms >= 30 ? 1 : 0);
}

function isAllDone() {
  return state.stirling.every(Boolean) && state.brand.every(Boolean) && state.dms >= 30;
}

function render() {
  document.getElementById('dateLabel').textContent = formatDate(state.date || todayStr());
  document.getElementById('streakCount').textContent = state.streak;

  let stirDone = 0;
  document.querySelectorAll('[data-group="stirling"]').forEach((row, i) => {
    const checked = state.stirling[i];
    row.classList.toggle('checked', checked);
    if (checked) stirDone++;
  });
  document.getElementById('stirlingDone').textContent = stirDone;
  document.getElementById('stirlingCard').classList.toggle('complete', stirDone === 3);

  let brandDone = 0;
  document.querySelectorAll('[data-group="brand"]').forEach((row, i) => {
    const checked = state.brand[i];
    row.classList.toggle('checked', checked);
    if (checked) brandDone++;
  });
  document.getElementById('brandDone').textContent = brandDone;
  document.getElementById('brandCard').classList.toggle('complete', brandDone === 2);

  const dms = state.dms;
  const dmPct = Math.min(100, Math.round((dms/30)*100));
  document.getElementById('dmNumber').textContent = dms;
  document.getElementById('dmNumber').classList.toggle('done', dms >= 30);
  document.getElementById('dmPct').textContent = dmPct;
  document.getElementById('dmFill').style.width = dmPct + '%';
  document.getElementById('dmCard').classList.toggle('complete', dms >= 30);

  const done = completedCount();
  const pct = Math.round((done / TOTAL_TASKS) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressTasks').textContent = `${done} / ${TOTAL_TASKS} tasks`;
  document.getElementById('progressFill').style.width = pct + '%';

  const allDone = isAllDone();
  document.getElementById('completeBanner').classList.toggle('visible', allDone);
  document.body.classList.toggle('day-done', allDone);
  if (allDone) {
    document.getElementById('bannerSub').textContent = state.synced ? 'Synced to Sheets' : 'Syncing to Sheets...';
  }
}

function toggleCheck(el) {
  const group = el.dataset.group;
  const idx = +el.dataset.index;
  const wasAllDone = isAllDone();
  if (group === 'stirling') state.stirling[idx] = !state.stirling[idx];
  if (group === 'brand') state.brand[idx] = !state.brand[idx];
  saveState();
  checkCompletion(wasAllDone);
  render();
}

function changeDm(delta) {
  const wasAllDone = isAllDone();
  state.dms = Math.max(0, Math.min(30, state.dms + delta));
  saveState();
  checkCompletion(wasAllDone);
  render();
}

function checkCompletion(wasAllDone) {
  if (!wasAllDone && isAllDone() && !state.completed) {
    state.completed = true;
    state.streak = (state.streak || 0) + 1;
    saveState();
    const el = document.getElementById('streakCount');
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
    syncToSheets(state, false);
  }
}

let retryTimer = null;

async function syncToSheets(data, silent = false) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
    if (!silent) showSync('Apps Script URL not set', 'err');
    return;
  }
  const payload = {
    date: data.date,
    stirling_clips: data.stirling.filter(Boolean).length,
    brand_clips: data.brand.filter(Boolean).length,
    dms_sent: data.dms,
    completed: data.completed,
    streak: data.streak
  };
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (json.status === 'ok') {
      state.synced = true;
      saveState();
      if (!silent) showSync('Synced to Sheets', 'ok');
      if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
      render();
    } else { throw new Error(json.error || 'Unknown'); }
  } catch(e) {
    if (!silent) showSync('Sync failed — will retry', 'err');
    if (!retryTimer) retryTimer = setTimeout(() => { retryTimer = null; syncToSheets(data, true); }, 60000);
  }
}

function showSync(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = `sync-status visible ${type}`;
  setTimeout(() => el.classList.remove('visible'), 3000);
}

function scheduleMidnightReset() {
  const now = new Date();
  const next = new Date(now);
  next.setDate(next.getDate() + 1);
  next.setHours(0, 0, 5, 0);
  setTimeout(() => {
    loadState();
    render();
    scheduleMidnightReset();
  }, next - now);
}

loadState();
render();
scheduleMidnightReset();
</script>
</body>
</html>
